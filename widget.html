<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QueenRyeRye Widget</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            --point: #10b981;        /* 에메랄드 그린 */
            --point-sub: #8b5cf6;    /* 뮤트 퍼플 */
            --bg-glass: rgba(2, 6, 23, 0.95);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: transparent;
            overflow: hidden;
        }

        /* 깔끔한 85px 높이 */
        #widget-container {
            width: 350px; height: 85px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--point);
            border-radius: 12px;
            display: flex; align-items: center;
            padding: 0 20px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transform: translateX(-30px); opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #widget-container.show { transform: translateX(0); opacity: 1; }

        /* 텍스트 정보 영역 */
        .info-group {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .title-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            margin-bottom: 2px;
        }

        #title {
            display: inline-block;
            font-size: 20px; font-weight: 900;
            color: var(--text-main);
            padding-right: 50px;
            will-change: transform;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            15% { transform: translateX(0); }
            85% { transform: translateX(var(--move-dist)); }
            100% { transform: translateX(var(--move-dist)); }
        }

        #singer {
            font-size: 13px; font-weight: 700;
            color: var(--point-sub);
            letter-spacing: 0.3px;
        }

        /* 🎵 추가된 재생바 (Progress Bar) */
        .playback-area {
            width: 60px; /* 적당한 가로폭 */
            margin: 0 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .progress-rail {
            width: 100%; height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        #progress-fill {
            position: absolute; left: 0; top: 0;
            width: 0%; height: 100%;
            background: var(--point);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--point);
            transition: width 0.5s ease-out; /* 부드러운 차오름 */
        }

        /* 비주얼라이저 */
        .visualizer {
            display: flex; align-items: flex-end; gap: 3px;
            height: 28px; flex-shrink: 0;
        }

        .bar {
            width: 4px; height: 6px;
            background: linear-gradient(to top, var(--point-sub), var(--point));
            border-radius: 1px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.45s; }
        .bar:nth-child(5) { animation-delay: 0.1s; }

        @keyframes bounce {
            0%, 100% { height: 6px; }
            50% { height: 28px; }
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div class="info-group">
            <div class="title-wrap" id="title-wrap">
                <div id="title">Loading...</div>
            </div>
            <div id="singer">Connecting to Remote</div>
        </div>
        
        <div class="playback-area">
            <div class="progress-rail">
                <div id="progress-fill"></div>
            </div>
            <div style="font-size: 8px; color: var(--text-sub); font-weight: 900; letter-spacing: 1px;">PLAYING</div>
        </div>

        <div class="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
            databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com/",
            projectId: "queenryerye-d8dac",
            appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songRef = ref(db, 'currentSong');

        const widget = document.getElementById('widget-container');
        const titleEl = document.getElementById('title');
        const singerEl = document.getElementById('singer');
        const titleWrap = document.getElementById('title-wrap');
        const progressFill = document.getElementById('progress-fill');

        let progressInterval;

        onValue(songRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // UI 초기화 및 숨기기
            widget.classList.remove('show');
            titleEl.style.animation = 'none';
            progressFill.style.width = '0%';
            clearInterval(progressInterval);
            
            setTimeout(() => {
                titleEl.innerText = data.title || "Untitled";
                singerEl.innerText = data.singer || "Unknown Artist";
                
                widget.classList.add('show');
                
                // 재생바 가상 진행 로직 (예: 3분 기준)
                let percent = 0;
                progressInterval = setInterval(() => {
                    percent += 0.5;
                    progressFill.style.width = percent + '%';
                    if (percent >= 100) clearInterval(progressInterval);
                }, 1000); // 1초마다 차오름

                // 슬라이딩 타이틀 계산
                setTimeout(() => {
                    const containerWidth = titleWrap.offsetWidth;
                    const textWidth = titleEl.scrollWidth;

                    if (textWidth > containerWidth + 5) {
                        const moveDist = containerWidth - textWidth;
                        titleEl.style.setProperty('--move-dist', `${moveDist}px`);
                        const duration = Math.max(6, textWidth / 40);
                        titleEl.style.animation = `marquee ${duration}s linear infinite alternate`;
                    }
                }, 1000);
            }, 400);
        });
    </script>
</body>
</html>
