<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>QueenRyeRye Visual Widget</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            --point: #10b981;        /* 에메랄드 그린 */
            --point-sub: #8b5cf6;    /* 뮤트 퍼플 */
            --bg-glass: rgba(2, 6, 23, 0.85); /* 진한 딥 네이비 글래스 */
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            background-color: transparent; /* 투명 배경 */
        }

        /* 350x150 사이즈의 컴팩트 위젯 */
        #widget-container {
            width: 350px; height: 150px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--point);
            border-radius: 15px;
            display: flex; align-items: center;
            padding: 0 25px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            /* 등장 애니메이션 */
            transform: translateY(20px); opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #widget-container.show { transform: translateY(0); opacity: 1; }

        /* 텍스트 영역: 제목 위, 가수 아래 */
        .info-group {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        #title {
            font-size: 26px; font-weight: 900;
            color: var(--text-main);
            margin-bottom: 8px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #singer {
            font-size: 15px; font-weight: 700;
            color: var(--point-sub);
            letter-spacing: 0.5px;
        }

        /* 우측 비주얼라이저 막대 효과 */
        .visualizer {
            display: flex; align-items: flex-end; gap: 4px;
            height: 40px; margin-left: 15px;
        }

        .bar {
            width: 5px; height: 10px;
            background: linear-gradient(to top, var(--point-sub), var(--point));
            border-radius: 2px;
            animation: bounce 1s ease-in-out infinite;
        }

        /* 각 막대별로 박자 다르게 */
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.1s; }
        .bar:nth-child(5) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }

        /* 수직 장식 라인 */
        .deco-line {
            position: absolute; right: 0; top: 20%;
            width: 2px; height: 60%;
            background: linear-gradient(to bottom, transparent, var(--point), transparent);
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div class="info-group">
            <div id="title">곡 제목 불러오는 중...</div>
            <div id="singer">가수 이름</div>
        </div>
        
        <div class="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        
        <div class="deco-line"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
            databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com/",
            projectId: "queenryerye-d8dac",
            appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const songRef = ref(db, 'currentSong');

        const widget = document.getElementById('widget-container');
        const titleEl = document.getElementById('title');
        const singerEl = document.getElementById('singer');

        onValue(songRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 곡이 바뀌면 살짝 사라졌다가 새로운 내용으로 등장
            widget.classList.remove('show');
            
            setTimeout(() => {
                titleEl.innerText = data.title || "Unknown Title";
                singerEl.innerText = data.singer || "Unknown Artist";
                widget.classList.add('show');
            }, 400);
        });
    </script>
</body>
</html>
