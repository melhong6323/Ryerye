<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QyeenRyeRye</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
<style>
body { 
  font-family: Arial, sans-serif; 
  padding:20px; 
}
h1 { 
  margin-bottom:20px; 
}
.song { 
  padding:8px; 
  border-bottom:1px solid #ddd; 
}
.singer { 
  font-weight:bold; 
}
.title { 
  margin-left:10px; 
}
.loading { 
  font-size:18px; 
}
</style>
</head>
<body>

<h1>QyeenRyeRye</h1>
<div id="list" class="loading">Loading...</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1mbBCeoTB4HhOsiTq4SHRmmLcb756TK238N3WIM-y2Tw/export?format=csv&gid=130932414";

Papa.parse(url, {
  download: true,
  skipEmptyLines: true,
  complete: function(result) {

    const data = result.data;
    const list = document.getElementById("list");
    list.innerHTML = "";

    let songs = [];
    let currentSinger = "";

    for(let i=0; i<data.length; i++){

      let row = data[i];
      if(!row || row.length < 2) continue;

      let singer = row[0] ? row[0].trim() : "";
      let title  = row[1] ? row[1].trim() : "";

      // 가수 셀이 비어있으면 이전 가수 유지 (병합 대응)
      if(singer !== ""){
        currentSinger = singer;
      }

      if(title !== ""){
        songs.push({
          singer: currentSinger,
          title: title
        });
      }
    }

    if(songs.length === 0){
      list.innerHTML = "No results";
      return;
    }

    songs.forEach(song=>{
      const div = document.createElement("div");
      div.className = "song";
      div.innerHTML = `
        <span class="singer">${song.singer}</span>
        <span class="title">${song.title}</span>
      `;
      list.appendChild(div);
    });

  },
  error: function(err){
    document.getElementById("list").innerHTML = "데이터 불러오기 실패";
    console.error(err);
  }
});

</script>
</body>
</html>
