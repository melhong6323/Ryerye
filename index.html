<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueenRyeRye Remote</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
:root{
--p:#2563eb;--bg:#f8fafc;--card:#fff;
--txt:#0f172a;--txt-l:#64748b;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);margin:0}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{margin-bottom:20px}

.tabs{display:flex;gap:8px;margin-bottom:25px;flex-wrap:wrap}
.tab{padding:12px 20px;border:1px solid #e2e8f0;background:#fff;border-radius:14px;cursor:pointer;font-weight:600;color:var(--txt-l)}
.tab.active{background:var(--p);color:#fff;border-color:var(--p)}

.ctrl{display:flex;gap:12px;margin-bottom:25px}
#search{flex:1;padding:14px;border:2px solid #e2e8f0;border-radius:14px}
.btn-reset{background:#0f172a;color:#fff;border:none;padding:0 20px;border-radius:14px;cursor:pointer}

.item{
display:grid;
grid-template-columns:110px 1.2fr 2fr 110px;
gap:15px;
background:#fff;
padding:16px;
margin-bottom:10px;
border-radius:18px;
align-items:center;
}

.singer{color:var(--txt-l);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.title{font-weight:800}

.b-cp,.b-sd{
height:40px;border-radius:12px;cursor:pointer;font-weight:700
}
.b-cp{border:1px solid #e2e8f0;background:#f1f5f9}
.b-sd{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none}

#status{text-align:center;margin-top:25px;color:#64748b;font-size:14px}
</style>
</head>
<body>

<div class="container">
<h1>QueenRyeRye</h1>

<div class="tabs" id="tab-nav"></div>

<div class="ctrl">
<input type="text" id="search" placeholder="Search by artist or title...">
<button class="btn-reset" onclick="resetWidget()">RESET</button>
</div>

<div id="song-list">🔄 Loading database...</div>
<div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ✅ Firebase 설정 (슬래시 없음!) */
const firebaseConfig = {
apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com",
projectId: "queenryerye-d8dac",
appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
};

let db=null;
try{
const app=initializeApp(firebaseConfig);
db=getDatabase(app);
}catch(e){
console.warn("Firebase 초기화 실패 - 목록은 정상 작동");
}

const SHEET_ID='1mbBCeoTB4HhOsiTq4SHRmmLcb756TK238N3WIM-y2Tw';

const categories=[
{ name:"전체", gid:"" },
{ name:"신곡", gid:"227086206" },
{ name:"K-POP", gid:"706245396" },
{ name:"J-POP", gid:"206609150" },
{ name:"POP", gid:"1262892887" },
{ name:"트로트", gid:"1709143109" },
{ name:"OST", gid:"22473696" }
];

let allSongs=[];
let currentCat="전체";

async function init(){
try{
allSongs=[];

const tasks=categories.slice(1).map(async(cat)=>{
const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${cat.gid}`;
const res=await fetch(url);
const csv=await res.text();

return new Promise(resolve=>{
Papa.parse(csv,{
skipEmptyLines:true,
complete:(result)=>{

let headerIndex=-1;

/* 🔥 1. 가수/제목 헤더 자동 탐지 */
result.data.forEach((row,i)=>{
if(row.includes("가수") && row.includes("제목")){
headerIndex=i;
}
});

if(headerIndex===-1){
resolve([]);
return;
}

let lastSinger="";

/* 🔥 2. 헤더 다음 줄부터 읽기 */
const parsed=result.data.slice(headerIndex+1).map(row=>{

let singer=(row[1]||"").toString().trim();
let title=(row[2]||"").toString().trim();

/* 제목 없으면 제거 */
if(!title) return null;

/* 병합셀 처리 */
if(!singer && title) singer=lastSinger;
if(singer) lastSinger=singer;

return{
cat:cat.name,
singer,
title
};

}).filter(Boolean);

resolve(parsed);
}
});
});
});

const results=await Promise.all(tasks);
allSongs=results.flat();

renderNav();
renderSongs();

document.getElementById("status").innerText=
`✅ ${allSongs.length}곡 동기화 완료`;

}catch(err){
document.getElementById("song-list").innerHTML=
"<div style='text-align:center;padding:80px;'>❌ 시트 로딩 실패</div>";
console.error(err);
}
}

function renderNav(){
const nav=document.getElementById("tab-nav");
nav.innerHTML=categories.map(c=>
`<button class="tab ${currentCat===c.name?'active':''}"
onclick="changeCat('${c.name}')">${c.name}</button>`
).join('');
}

function renderSongs(){
const query=document.getElementById("search").value.toLowerCase();
const list=document.getElementById("song-list");

const filtered=allSongs.filter(s=>
(currentCat==="전체"||s.cat===currentCat)&&
((s.singer||"").toLowerCase().includes(query)||
(s.title||"").toLowerCase().includes(query))
);

list.innerHTML=filtered.map(s=>{
const singer=JSON.stringify(s.singer);
const title=JSON.stringify(s.title);
const full=JSON.stringify(`${s.singer} - ${s.title}`);

return`
<div class="item">
<button class="b-cp" onclick='cp(${full},this)'>Copy</button>
<div class="singer">${s.singer}</div>
<div class="title">${s.title}</div>
<button class="b-sd" onclick='sd(${singer},${title})'>SEND</button>
</div>
`;
}).join('')||"<div style='text-align:center;padding:80px;'>No results</div>";
}

window.changeCat=(name)=>{
currentCat=name;
renderNav();
renderSongs();
};

window.cp=(txt,btn)=>{
navigator.clipboard.writeText(txt);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy",1000);
};

window.sd=(singer,title)=>{
if(!db){alert("Firebase 연결 안됨");return;}
set(ref(db,'currentSong'),{
singer,
title,
time:Date.now()
});
};

window.resetWidget=()=>{
if(!db){alert("Firebase 연결 안됨");return;}
set(ref(db,'currentSong'),{
singer:"QueenRyeRye",
title:"Standby Mode",
time:Date.now()
});
alert("Reset Complete");
};

document.getElementById("search").oninput=renderSongs;

init();
</script>

</body>
</html>
