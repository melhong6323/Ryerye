<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueenRyeRye</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

        :root {
            /* 눈이 편안한 딥 씨 & 뮤트 퍼플 팔레트 */
            --bg-deep: #020617;      /* 심해처럼 깊은 네이비 */
            --bg-card: #0f172a;      /* 차분한 네이비 카드 */
            --bg-inner: #1e293b;     /* 내부 요소 배경 */
            
            /* 포인트 컬러: 차분한 에메랄드 & 라벤더 */
            --point: #10b981;        /* 부드러운 에메랄드 그린 */
            --point-sub: #8b5cf6;    /* 뮤트 퍼플 (라벤더) */
            --point-alpha: rgba(16, 185, 129, 0.1);
            
            --text-main: #f1f5f9;    /* 눈부심 없는 오프화이트 */
            --text-sub: #94a3b8;     /* 블루이시 그레이 */
            --border: rgba(255, 255, 255, 0.05);
            --soop: #2563eb; --yt: #ef4444;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-deep); color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* 상단 헤더: 글래스모피즘 효과 */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            height: 70px; padding: 0 40px; flex-shrink: 0;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 20px; font-weight: 800; margin: 0; letter-spacing: 1.5px; }
        .header h1 span { color: var(--point); }
        .links { display: flex; gap: 10px; }
        .l-btn { padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: 800; color: #fff; opacity: 0.8; transition: 0.3s; }
        .l-btn:hover { opacity: 1; transform: translateY(-1px); }

        /* 메인 레이아웃 */
        .container {
            display: flex; gap: 20px; max-width: 1600px; margin: 0 auto;
            padding: 20px; height: calc(100vh - 70px); width: 100%;
        }

        /* 좌측 패널 */
        .left-pane { flex: 0 0 340px; display: flex; flex-direction: column; gap: 15px; }
        .pane-card { background: var(--bg-card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* 카테고리 탭 */
        .tab-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .tab {
            padding: 9px 14px; border-radius: 10px; background: var(--bg-inner);
            color: var(--text-sub); cursor: pointer; font-size: 12px;
            font-weight: 700; transition: 0.2s; border: 1px solid transparent;
        }
        .tab.active { background: var(--point-alpha); color: var(--point); border: 1px solid var(--point); }

        /* 공지사항 UI: 시인성 강화 */
        .notice-box {
            flex: 1; display: flex; flex-direction: column;
            background: var(--bg-card); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .notice-header { 
            background: rgba(16, 185, 129, 0.05); padding: 15px 24px; 
            color: var(--point); font-size: 10px; font-weight: 900; 
            letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--border);
        }
        .notice-list { list-style: none; padding: 20px 24px; margin: 0; overflow-y: auto; }
        .notice-item { 
            display: flex; gap: 15px; margin-bottom: 18px; 
            font-size: 13.5px; line-height: 1.6; color: #cbd5e1;
        }
        .notice-num { 
            color: var(--point-sub); font-weight: 900; font-size: 14px; flex-shrink: 0;
        }
        .notice-hl { color: var(--point); font-weight: 800; border-bottom: 1px solid var(--point-alpha); }

        /* 우측 패널: 리스트 영역 */
        .right-pane {
            flex: 1; background: var(--bg-card); border-radius: 24px;
            border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
        }

        .list-header {
            padding: 15px 25px; display: flex; gap: 12px; align-items: center;
            background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);
        }
        #searchInput {
            flex: 1; background: var(--bg-inner); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 20px; font-size: 14px; color: white; outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--point-sub); }
        
        .reset-btn {
            background: transparent; color: var(--text-sub); border: 1px solid var(--border);
            padding: 0 16px; height: 42px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .reset-btn:hover { border-color: var(--point-sub); color: var(--point-sub); }

        /* 곡 리스트 행 */
        #song-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .song-row {
            display: grid; grid-template-columns: 90px 1.1fr 2fr 90px;
            align-items: center; gap: 15px; padding: 14px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02); transition: 0.2s;
        }
        .song-row:hover { background: rgba(255, 255, 255, 0.03); border-radius: 15px; }

        .s-singer { font-weight: 600; color: var(--text-sub); font-size: 13px; }
        .s-title { font-weight: 700; color: var(--text-main); font-size: 14.5px; }

        /* 버튼 디자인 */
        .btn-cp {
            background: var(--bg-inner); border: 1px solid var(--border); height: 36px;
            border-radius: 10px; cursor: pointer; color: var(--text-sub); font-size: 11px;
            font-weight: 700; position: relative; transition: 0.2s;
        }
        .btn-cp:hover { color: var(--text-main); border-color: var(--text-sub); }
        .btn-cp.copied::after {
            content: "Copied"; position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: var(--point-sub); color: white; font-size: 10px; padding: 3px 8px; border-radius: 5px;
        }

        .btn-sd {
            background: var(--bg-inner); color: var(--point); border: 1px solid var(--point);
            height: 36px; border-radius: 10px; font-weight: 800; font-size: 11px; 
            cursor: pointer; letter-spacing: 0.5px; transition: 0.3s;
        }
        .btn-sd:hover { background: var(--point); color: white; box-shadow: 0 0 15px var(--point-alpha); }

        #load-info { text-align: center; padding: 12px; font-size: 11px; color: var(--text-sub); border-top: 1px solid var(--border); font-weight: 700; letter-spacing: 1px; }
        
        /* 스크롤바 최적화 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--bg-inner); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--point-sub); }
    </style>
</head>
<body>

    <header class="header">
        <h1>QUEEN RYERYE <span>REMOTE</span></h1>
        <div class="links">
            <a href="https://www.sooplive.co.kr/station/eunyounglove" target="_blank" class="l-btn" style="background:var(--soop)">SOOP</a>
            <a href="https://www.youtube.com/@queen_rye" target="_blank" class="l-btn" style="background:var(--yt)">YouTube</a>
        </div>
    </header>

    <div class="container">
        <div class="left-pane">
            <div class="pane-card">
                <span style="font-size:9px; font-weight:900; color:var(--point-sub); display:block; margin-bottom:12px; letter-spacing:1.5px; text-transform:uppercase;">Navigation</span>
                <div id="tabs" class="tab-group">
                    <button id="tab-전체" class="tab active" onclick="changeCat('전체')">전체</button>
                </div>
            </div>

            <div class="notice-box">
                <div class="notice-header">Guidelines</div>
                <div class="notice-list">
                    <div class="notice-item"><span class="notice-num">01</span><span>목 상태에 따라 순서가 나중으로 밀릴 수도 있습니다.</span></div>
                    <div class="notice-item"><span class="notice-num">02</span><span>노래 중에는 채팅 확인이 어려우니 <span class="notice-hl">노래가 끝난 후</span> 채팅 부탁드려요.</span></div>
                    <div class="notice-item"><span class="notice-num">03</span><span>응원봉을 흔들어주시면 례례가 신나서 더 열심히 노래합니다!</span></div>
                    <div class="notice-item"><span class="notice-num">04</span><span>영어가 많은 곡은 <span class="notice-hl">노래책 비고란 확인</span> 후 신청 부탁드립니다.</span></div>
                    <div class="notice-item"><span class="notice-num">05</span><span>일반 신청 : 50개 / 미션 3곡 : 100개</span></div>
                    <div class="notice-item"><span class="notice-num">06</span><span>연습곡 <span class="notice-hl">한국곡 2000 / 외국곡 2500</span> (디코 확인)</span></div>
                    <div style="margin-top:auto; padding-top:20px; text-align:center; color:var(--point-sub); font-weight:800; font-size:11px; opacity: 0.8;">※ 휴방 공지는 팬심/디코 참조 ※</div>
                </div>
            </div>
        </div>

        <div class="right-pane">
            <div class="list-header">
                <input type="text" id="searchInput" placeholder="Search tracks or artists...">
                <button onclick="resetWidget()" class="reset-btn">WIDGET RESTART</button>
            </div>
            <div id="song-list"></div>
            <div id="load-info">SYSTEM CONNECTED</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
            databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com/",
            projectId: "queenryerye-d8dac",
            appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const SHEET_ID = '1mbBCeoTB4HhOsiTq4SHRmmLcb756TK238N3WIM-y2Tw';
        
        const categories = [
            { name: "신곡", gid: "227086206" },
            { name: "K-POP", gid: "706245396" },
            { name: "J-POP", gid: "206609150" },
            { name: "POP", gid: "1262892887" },
            { name: "트로트", gid: "1709143109" },
            { name: "OST", gid: "22473696" }
        ];

        let allSongs = [];
        let currentCat = "전체";

        async function init() {
            const statusEl = document.getElementById('load-info');
            const tabContainer = document.getElementById('tabs');
            allSongs = [];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.id = `tab-${cat.name}`; btn.className = 'tab';
                btn.innerText = cat.name; btn.onclick = () => changeCat(cat.name);
                tabContainer.appendChild(btn);
            });

            for (const cat of categories) {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${cat.gid}`;
                try {
                    const res = await fetch(url);
                    const csv = await res.text();
                    await new Promise(resolve => {
                        Papa.parse(csv, {
                            complete: (results) => {
                                let singerIdx = -1, titleIdx = -1, headerFound = false, lastSinger = "";
                                for (let i = 0; i < results.data.length; i++) {
                                    const row = results.data[i];
                                    if (!headerFound) {
                                        const rowStr = row.join(" ");
                                        if (rowStr.includes("가수") && rowStr.includes("제목")) {
                                            row.forEach((cell, idx) => {
                                                if (cell.includes("가수")) singerIdx = idx;
                                                if (cell.includes("제목")) titleIdx = idx;
                                            });
                                            if (singerIdx !== -1 && titleIdx !== -1) headerFound = true;
                                        }
                                        continue;
                                    }
                                    const s = (row[singerIdx] || "").toString().trim();
                                    const t = (row[titleIdx] || "").toString().trim();
                                    if (s !== "") lastSinger = s.replace(/"/g, '');
                                    if (t && t !== "" && t !== "제목" && t !== "TITLE") {
                                        allSongs.push({ cat: cat.name, singer: lastSinger || "-", title: t.replace(/"/g, '') });
                                    }
                                }
                                resolve();
                            }
                        });
                    });
                } catch (e) { console.error(`${cat.name} Load Error`); }
            }
            renderSongs();
            statusEl.innerText = `DATABASE SYNCHRONIZED : ${allSongs.length} TRACKS FOUND`;
        }

        window.changeCat = (name) => {
            currentCat = name;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(name === '전체' ? 'tab-전체' : `tab-${name}`).classList.add('active');
            renderSongs();
        };

        function renderSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const listEl = document.getElementById('song-list');
            const filtered = allSongs.filter(s => 
                (currentCat === "전체" || s.cat === currentCat) &&
                (s.singer.toLowerCase().includes(query) || s.title.toLowerCase().includes(query))
            );

            listEl.innerHTML = filtered.map(s => `
                <div class="song-row">
                    <button class="btn-cp" onclick="copyText('${s.singer}-${s.title}', this)">📋 Copy</button>
                    <div class="s-singer">${s.singer}</div>
                    <div class="s-title">${s.title}</div>
                    <button class="btn-sd" onclick="window.sendToWidget('${s.singer}', '${s.title}')">SEND</button>
                </div>
            `).join('') || '<div style="text-align:center; padding:100px; color:var(--text-sub);">No search results.</div>';
        }

        window.copyText = (txt, btn) => {
            navigator.clipboard.writeText(txt).then(() => {
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        };

        window.sendToWidget = (singer, title) => {
            set(ref(db, 'currentSong'), { singer, title, time: Date.now() });
        };

        window.resetWidget = () => {
            if(confirm("위젯 화면을 초기화하시겠습니까?")) {
                set(ref(db, 'currentSong'), { singer: "QueenRyeRye", title: "Standby Mode", time: Date.now() });
            }
        };

        document.getElementById('searchInput').oninput = renderSongs;
        init();
    </script>
</body>
</html>
