<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueenRyeRye Remote</title>
    <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #fdfdfd;
            --card-bg: #ffffff;
            --text: #334155;
            --soop: #0046FF;
            --yt: #FF0000;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 중앙 정렬 컨테이너 (여백 충분) */
        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 4-6. 상단 헤더 섹션 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(45deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-links { display: flex; gap: 10px; }
        .link-btn {
            padding: 6px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }
        .btn-soop { background-color: var(--soop); }
        .btn-yt { background-color: var(--yt); }
        .link-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* 3. 카테고리 탭 (어지러움 방지) */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }
        .tab {
            padding: 8px 18px;
            border: none;
            background: #f1f5f9;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            transition: 0.3s;
        }
        .tab.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        /* 8. 검색창 및 새로고침 버튼 */
        .search-area {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        #search {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        #search:focus { border-color: var(--primary); border-width: 2px; }
        .btn-refresh {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }
        .btn-refresh:hover { background: #f8fafc; transform: rotate(45deg); }

        /* 7. 노래 목록 아이템 UI */
        .song-item {
            display: grid;
            grid-template-columns: auto 1fr 1.5fr auto;
            align-items: center;
            gap: 20px;
            background: var(--card-bg);
            padding: 15px 25px;
            margin-bottom: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            transition: 0.2s;
        }
        .song-item:hover { transform: scale(1.01); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08); }

        .song-singer { font-weight: 600; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-title { font-weight: 700; color: #1e293b; font-size: 1.1rem; }

        /* 2. 버튼 디자인 */
        .btn-mini-copy {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .btn-mini-copy:hover { background: #f1f5f9; }

        .btn-send {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        .btn-send:hover { opacity: 0.9; box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3); }

        #load-status {
            text-align: center; font-size: 12px; color: #94a3b8; margin-top: 20px; display: block;
        }

        @media (max-width: 600px) {
            .song-item { grid-template-columns: auto 1fr auto; gap: 10px; padding: 12px; }
            .song-title { grid-column: 2 / 3; font-size: 1rem; }
            .song-singer { grid-column: 2 / 3; font-size: 0.8rem; }
            .btn-send { grid-column: 3 / 4; grid-row: 1 / 3; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>QueenRyeRye</h1>
        <div class="header-links">
            <a href="https://www.sooplive.co.kr/station/eunyounglove" target="_blank" class="link-btn btn-soop">SOOP</a>
            <a href="https://www.youtube.com/@queen_rye" target="_blank" class="link-btn btn-yt">YOUTUBE</a>
        </div>
    </header>

    <nav class="category-tabs" id="tab-nav">
        <button class="tab active" onclick="filterCategory('전체')">전체</button>
    </nav>

    <div class="search-area">
        <input type="text" id="search" placeholder="찾으시는 곡이나 가수를 입력하세요...">
        <button class="btn-refresh" onclick="fetchAllData()" title="시트 새로고침">🔄</button>
    </div>

    <div id="song-list"></div>
    <span id="load-status">데이터 연결 중...</span>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
        databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com/",
        projectId: "queenryerye-d8dac",
        appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SHEET_ID = '1mbBCeoTB4HhOsiTq4SHRmmLcb756TK238N3WIM-y2Tw';
    
    const categories = [
        { name: "신곡", gid: "227086206" },
        { name: "K-POP", gid: "706245396" },
        { name: "J-POP", gid: "206609150" },
        { name: "POP", gid: "1262892887" },
        { name: "트로트", gid: "1709143109" },
        { name: "OST", gid: "1709143109" }
    ];

    let allSongs = [];
    let currentCat = "전체";

    // 데이터 불러오기
    window.fetchAllData = async function() {
        const statusEl = document.getElementById('load-status');
        const navEl = document.getElementById('tab-nav');
        allSongs = [];
        
        // 탭 초기화 (전체 버튼은 유지)
        navEl.innerHTML = '<button class="tab active" onclick="filterCategory(\'전체\')">전체</button>';

        for (const cat of categories) {
            const btn = document.createElement('button');
            btn.className = 'tab';
            btn.innerText = cat.name;
            btn.onclick = () => filterCategory(cat.name);
            navEl.appendChild(btn);

            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${cat.gid}`;
            
            try {
                const res = await fetch(url);
                const csv = await res.text();
                Papa.parse(csv, {
                    complete: (results) => {
                        const sheetSongs = results.data.slice(1)
                            .filter(row => row[1] && row[2])
                            .map(row => ({
                                category: cat.name,
                                singer: row[1].replace(/"/g, '').trim(),
                                title: row[2].replace(/"/g, '').trim()
                            }));
                        allSongs = allSongs.concat(sheetSongs);
                        updateDisplay();
                    }
                });
            } catch (e) { console.error(cat.name + " 실패"); }
        }
        statusEl.innerText = `QueenRyeRye 노래책 연결 완료`;
    }

    // 카테고리 필터링 (스크롤 없이 교체)
    window.filterCategory = (catName) => {
        currentCat = catName;
        document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.innerText.includes(catName));
        });
        updateDisplay();
    };

    // 화면 갱신
    function updateDisplay() {
        const listEl = document.getElementById('song-list');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        listEl.innerHTML = '';

        const filtered = allSongs.filter(s => {
            const matchCat = (currentCat === "전체" || s.category === currentCat);
            const matchSearch = (s.singer.toLowerCase().includes(searchTerm) || s.title.toLowerCase().includes(searchTerm));
            return matchCat && matchSearch;
        });

        filtered.forEach(song => {
            const fullText = `${song.singer} - ${song.title}`;
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `
                <button class="btn-mini-copy" onclick="copyText('${fullText}')" title="복사">📋</button>
                <div class="song-singer">${song.singer}</div>
                <div class="song-title">${song.title}</div>
                <button class="btn-send" onclick="sendToWidget('${song.singer}', '${song.title}')">🚀 전송</button>
            `;
            listEl.appendChild(div);
        });
    }

    window.copyText = (text) => {
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            const original = btn.innerText;
            btn.innerText = "✅";
            setTimeout(() => btn.innerText = "📋", 1000);
        });
    };

    window.sendToWidget = (singer, title) => {
        set(ref(db, 'currentSong'), { singer, title, time: Date.now() })
        .then(() => {
            console.log("전송완료");
            // 전송 시 시각적 효과 (선택사항)
        });
    };

    document.getElementById('search').addEventListener('input', updateDisplay);

    fetchAllData();
</script>
</body>
</html>
