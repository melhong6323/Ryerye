<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueenRyeRye Remote Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        :root {
            --primary: #2563eb; --bg: #f8fafc; --card: #ffffff;
            --text-main: #0f172a; --text-sub: #64748b;
            --soop: #0046FF; --yt: #FF0000;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; font-family: 'Pretendard', sans-serif;
            background-color: var(--bg); color: var(--text-main);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; height: 80px; padding: 0 40px; flex-shrink: 0; }
        .header h1 { font-size: 28px; font-weight: 900; margin: 0; letter-spacing: -1px; flex: 1; text-align: center; margin-left: 120px; }
        .header-links { display: flex; gap: 10px; }
        .link-btn { padding: 8px 16px; border-radius: 10px; text-decoration: none; font-size: 13px; font-weight: 800; color: #fff; transition: 0.2s; }

        /* Layout */
        .container { display: flex; gap: 20px; max-width: 1600px; margin: 0 auto; padding: 0 20px 20px; height: calc(100vh - 80px); width: 100%; }
        .left-pane { flex: 0 0 320px; display: flex; flex-direction: column; gap: 15px; }
        .category-card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #e2e8f0; }
        .tab-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .tab { padding: 10px 14px; border-radius: 10px; background: #f1f5f9; color: var(--text-sub); cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; border:none; }
        .tab.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }

        .notice-card { flex: 1; background: #fffbeb; border-radius: 20px; padding: 20px; border: 1px solid #fde68a; overflow-y: auto; font-size: 14px; line-height: 1.7; color: #92400e; }
        .notice-title { font-weight: 800; font-size: 12px; color: #b45309; margin-bottom: 10px; display: block; }

        .right-pane { flex: 1; background: var(--card); border-radius: 24px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03); }
        .list-header { padding: 20px; background: #fff; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #f1f5f9; }
        #searchInput { flex: 1; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 14px; padding: 14px 20px; font-size: 15px; outline: none; }
        .reset-btn { padding: 0 20px; height: 50px; background: #0f172a; color: #fff; border: none; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; }

        #song-list { flex: 1; overflow-y: auto; padding: 10px 20px; }
        .song-item { display: grid; grid-template-columns: 100px 1.2fr 2fr 100px; align-items: center; gap: 15px; padding: 16px 20px; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        .song-item:hover { background: #eff6ff; border-radius: 15px; }

        .singer-name { font-weight: 600; color: var(--text-sub); font-size: 14px; }
        .song-title { font-weight: 800; color: var(--text-main); font-size: 16px; }

        /* Buttons */
        .btn-copy { background: #fff; border: 1px solid #e2e8f0; height: 40px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; color: var(--text-sub); position: relative; }
        .btn-copy.copied::after { content: "Copied!"; position: absolute; top: -35px; background: #333; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 5px; }
        .btn-send { background: linear-gradient(135deg, var(--primary), #1d4ed8); color: white; border: none; height: 40px; border-radius: 10px; font-weight: 900; font-size: 12px; cursor: pointer; letter-spacing: 1px; }

        #load-status { text-align: center; padding: 15px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <header class="header">
        <div style="width:120px;"></div>
        <h1>QueenRyeRye <span style="color:var(--primary)">REMOTE</span></h1>
        <div class="header-links">
            <a href="https://www.sooplive.co.kr/station/eunyounglove" target="_blank" class="link-btn" style="background:var(--soop)">SOOP</a>
            <a href="https://www.youtube.com/@queen_rye" target="_blank" class="link-btn" style="background:var(--yt)">YOUTUBE</a>
        </div>
    </header>

    <div class="container">
        <div class="left-pane">
            <div class="category-card">
                <span style="font-size:10px; font-weight:800; color:var(--primary); display:block; margin-bottom:10px;">CATEGORIES</span>
                <div id="tabs" class="tab-group">
                    <button class="tab active" onclick="changeCat('전체')">전체</button>
                </div>
            </div>
            <div class="notice-card">
                <span class="notice-title">📋 NOTICE</span>
                <div id="notice-content">불러오는 중...</div>
            </div>
        </div>

        <div class="right-pane">
            <div class="list-header">
                <input type="text" id="searchInput" placeholder="가수 또는 제목 검색...">
                <button onclick="resetWidget()" class="reset-btn">WIDGET RESTART</button>
            </div>
            <div id="song-list"></div>
            <div id="load-status">스프레드시트 동기화 중...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDD81eW0FEgovKUjM2RwE9S-XHhEz2V2gU",
            databaseURL: "https://queenryerye-d8dac-default-rtdb.firebaseio.com/",
            projectId: "queenryerye-d8dac",
            appId: "1:217840989435:web:f2391bb48fda1c49f12c5e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const SHEET_ID = '1mbBCeoTB4HhOsiTq4SHRmmLcb756TK238N3WIM-y2Tw';
        
        // 1 & 2. 업데이트된 GID 정보 및 행 설정
        const categories = [
            { name: "신곡", gid: "227086206", start: 4 }, // 5행 (헤더는 4행)
            { name: "K-POP", gid: "706245396", start: 7 }, // 8행 (헤더는 7행)
            { name: "J-POP", gid: "206609150", start: 7 },
            { name: "POP", gid: "1262892887", start: 7 },
            { name: "트로트", gid: "1709143109", start: 7 },
            { name: "OST", gid: "22473696", start: 7 }
        ];

        let allSongs = [];
        let currentCat = "전체";

        // 공지사항 로드 (GID 130932414 적용)
        async function loadNotice() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=130932414`;
            try {
                const res = await fetch(url);
                const csv = await res.text();
                Papa.parse(csv, {
                    complete: (results) => {
                        const content = results.data.map(row => row[0]).filter(Boolean).join('<br>');
                        document.getElementById('notice-content').innerHTML = content;
                    }
                });
            } catch (e) { document.getElementById('notice-content').innerText = "공지사항 로드 실패"; }
        }

        async function init() {
            const statusEl = document.getElementById('load-status');
            const tabContainer = document.getElementById('tabs');
            allSongs = [];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'tab';
                btn.innerText = cat.name;
                btn.onclick = () => changeCat(cat.name);
                tabContainer.appendChild(btn);
            });

            const tasks = categories.map(async (cat) => {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${cat.gid}`;
                const res = await fetch(url);
                const csv = await res.text();
                
                return new Promise(resolve => {
                    Papa.parse(csv, {
                        complete: (results) => {
                            // 2. 헤더 행에서 '가수'와 '제목' 열의 인덱스 찾기
                            let singerIdx = 1, titleIdx = 2; // 기본값
                            const headerRow = results.data[cat.start - 1]; // 헤더는 데이터 시작 전 줄
                            
                            if (headerRow) {
                                headerRow.forEach((cell, idx) => {
                                    if (cell.includes("가수")) singerIdx = idx;
                                    if (cell.includes("제목")) titleIdx = idx;
                                });
                            }

                            // 3. 셀 병합 인식 및 데이터 추출 로직
                            let lastSinger = ""; 
                            const data = results.data.slice(cat.start).map(row => {
                                let singer = (row[singerIdx] || "").toString().trim();
                                let title = (row[titleIdx] || "").toString().trim();

                                if (singer !== "") {
                                    lastSinger = singer.replace(/"/g, '');
                                }
                                
                                if (!title || title === "" || title === "제목") return null;

                                return { 
                                    cat: cat.name, 
                                    singer: lastSinger || "Unknown", 
                                    title: title.replace(/"/g, '') 
                                };
                            }).filter(Boolean);
                            resolve(data);
                        }
                    });
                });
            });

            const results = await Promise.all(tasks);
            allSongs = results.flat();
            renderSongs();
            statusEl.innerText = `✅ Total ${allSongs.length} songs synced`;
        }

        window.changeCat = (name) => {
            currentCat = name;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === name));
            renderSongs();
        };

        function renderSongs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const listEl = document.getElementById('song-list');
            const filtered = allSongs.filter(s => 
                (currentCat === "전체" || s.cat === currentCat) &&
                (s.singer.toLowerCase().includes(query) || s.title.toLowerCase().includes(query))
            );

            listEl.innerHTML = filtered.map(s => `
                <div class="song-item">
                    <button class="btn-copy" onclick="copyText('${s.singer}-${s.title}', this)">📋 Copy</button>
                    <div class="singer-name">${s.singer}</div>
                    <div class="song-title">${s.title}</div>
                    <button class="btn-send" onclick="sendToWidget('${s.singer}', '${s.title}')">SEND</button>
                </div>
            `).join('') || '<div style="text-align:center; padding:100px; color:#94a3b8;">No results found.</div>';
        }

        window.copyText = (txt, btn) => {
            navigator.clipboard.writeText(txt).then(() => {
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
            });
        };

        window.sendToWidget = (singer, title) => {
            set(ref(db, 'currentSong'), { singer, title, time: Date.now() });
        };

        window.resetWidget = () => {
            if(confirm("방송 위젯을 초기화하시겠습니까?")) {
                set(ref(db, 'currentSong'), { singer: "QueenRyeRye", title: "Standby Mode", time: Date.now() });
            }
        };

        document.getElementById('searchInput').oninput = renderSongs;

        loadNotice();
        init();
    </script>
</body>
</html>
